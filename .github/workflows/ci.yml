name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache system dependencies
        id: cache-apt
        uses: actions/cache@v3
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check Rust formatting
        run: cd src-tauri && cargo fmt --all -- --check

      - name: Run Clippy
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Run Rust tests
        run: cd src-tauri && cargo test --verbose

  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  integration:
    name: Integration Check
    runs-on: macos-latest
    needs: [rust-test, frontend-build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (debug mode)
        run: npm run tauri build -- --debug

      - name: Verify build artifacts
        run: |
          ls -la src-tauri/target/debug/bundle/macos/
          if [ ! -d "src-tauri/target/debug/bundle/macos/SceneBrowser.app" ]; then
            echo "App bundle not found!"
            exit 1
          fi

      - name: Ad-hoc sign the app bundle
        run: |
          # Ad-hoc signing for development builds
          codesign --force --deep --sign - src-tauri/target/debug/bundle/macos/SceneBrowser.app

          # Verify signature
          codesign -dv --verbose=4 src-tauri/target/debug/bundle/macos/SceneBrowser.app

      - name: Create DMG from app bundle
        run: |
          # Install create-dmg
          brew install create-dmg

          # Create DMG with proper settings
          cd src-tauri/target/debug/bundle/macos
          create-dmg \
            --volname "SceneBrowser" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "SceneBrowser.app" 200 190 \
            --hide-extension "SceneBrowser.app" \
            --app-drop-link 600 185 \
            "SceneBrowser-dev.dmg" \
            "SceneBrowser.app" || true

          # Fallback: simple DMG creation if create-dmg fails
          if [ ! -f "SceneBrowser-dev.dmg" ]; then
            echo "Creating simple DMG..."
            hdiutil create -volname "SceneBrowser" -srcfolder "SceneBrowser.app" -ov -format UDZO "SceneBrowser-dev.dmg"
          fi

          ls -lh SceneBrowser-dev.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: scenebrowser-macos-dev-${{ github.sha }}
          path: src-tauri/target/debug/bundle/macos/SceneBrowser-dev.dmg
          retention-days: 30
