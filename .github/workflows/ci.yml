name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-test:
    name: Rust Tests
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache system dependencies
        id: cache-apt
        uses: actions/cache@v3
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Create dummy dist directory
        run: mkdir -p dist

      - name: Check Rust formatting
        run: cd src-tauri && cargo fmt --all -- --check

      - name: Run Clippy
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Run Rust tests
        run: cd src-tauri && cargo test --verbose

  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  integration:
    name: Integration Check
    runs-on: macos-latest
    needs: [rust-test, frontend-build]
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Cache Cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app (release mode)
        run: npm run tauri build

      - name: Verify release build artifacts
        run: |
          ls -la src-tauri/target/release/bundle/macos/
          if [ ! -d "src-tauri/target/release/bundle/macos/SceneBrowser.app" ]; then
            echo "Release app bundle not found!"
            exit 1
          fi

      - name: Test release app (Finder-like execution)
        run: |
          echo "=== Finder-like execution test (using 'open' command) ==="
          # The 'open' command mimics double-clicking from Finder
          # This simulates the real user experience where PATH is limited

          # Remove any existing debug log
          rm -f ~/scenebrowser-debug.log

          echo "Opening app with 'open' command (mimics Finder double-click)..."
          # Open the app and wait a moment for it to start
          open src-tauri/target/release/bundle/macos/SceneBrowser.app

          # Wait for app to start and log initialization
          echo "Waiting for app to start..."
          sleep 5

          # Close the app
          echo "Closing app..."
          osascript -e 'quit app "SceneBrowser"' 2>/dev/null || true
          sleep 2

          echo ""
          echo "=== Debug Output (from log file) ==="
          if [ -f ~/scenebrowser-debug.log ]; then
            cat ~/scenebrowser-debug.log
          else
            echo "Log file not found at ~/scenebrowser-debug.log"
          fi

          echo ""
          echo "=== Debug Output (from system log - broader search) ==="
          # Try multiple approaches to get the logs
          log show --predicate 'eventMessage CONTAINS "SceneBrowser" OR eventMessage CONTAINS "DEBUG" OR eventMessage CONTAINS "ffmpeg"' --style syslog --last 5m 2>/dev/null | head -100 || echo "log show failed"

          echo ""
          echo "=== All SceneBrowser process logs ==="
          log show --predicate 'process == "SceneBrowser"' --last 5m 2>/dev/null | head -100 || echo "No process logs found"

      - name: Check environment
        run: |
          echo ""
          echo "=== Environment Check ==="
          echo "Current PATH: $PATH"
          echo ""
          echo "FFmpeg/FFprobe locations:"
          which ffmpeg || echo "ffmpeg not in PATH"
          which ffprobe || echo "ffprobe not in PATH"
          echo ""
          echo "Checking common installation paths:"
          ls -la /opt/homebrew/bin/ffmpeg 2>/dev/null || echo "/opt/homebrew/bin/ffmpeg not found"
          ls -la /usr/local/bin/ffmpeg 2>/dev/null || echo "/usr/local/bin/ffmpeg not found"
