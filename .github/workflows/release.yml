name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-latest
    strategy:
      matrix:
        target: [universal-apple-darwin, x86_64-apple-darwin, aarch64-apple-darwin]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != 'universal-apple-darwin'
        run: rustup target add ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SceneBrowser ${{ github.ref_name }}'
          releaseBody: |
            ## SceneBrowser ${{ github.ref_name }}

            ### Downloads
            Choose the appropriate DMG for your Mac:
            - **Universal (Apple Silicon + Intel)**: Works on all Macs
            - **Apple Silicon**: M1/M2/M3/M4 Macs
            - **Intel**: Intel-based Macs

            ### Installation
            1. Download the DMG file
            2. Open the DMG file
            3. Drag SceneBrowser to Applications folder
            4. If you see a security warning, run: `xattr -cr /Applications/SceneBrowser.app`

            ### Requirements
            - macOS 11.0 (Big Sur) or later
            - FFmpeg (install via `brew install ffmpeg`)

            ### Changes
            See [CHANGELOG.md](https://github.com/nackon/SceneBrowser/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.target != 'universal-apple-darwin' && format('--target {0}', matrix.target) || '' }}
