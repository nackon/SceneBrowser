name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and Release
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-universal-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-universal-cargo-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'SceneBrowser ${{ github.ref_name }}'
          releaseBody: |
            ## SceneBrowser ${{ github.ref_name }}

            ### Installation
            1. Download the DMG file
            2. Open the DMG file
            3. Drag SceneBrowser to Applications folder
            4. If you see a security warning, run: `xattr -cr /Applications/SceneBrowser.app`

            ### Requirements
            - macOS 11.0 (Big Sur) or later
            - FFmpeg (install via `brew install ffmpeg`)

            ### Changes
            See [CHANGELOG.md](https://github.com/nackon/SceneBrowser/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
